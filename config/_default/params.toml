colorScheme = "blowfish"
defaultAppearance = "dark"

[header]
  layout = "basic"
  showLanguageSwitcher = true  # Ensure this is true

[homepage]
  layout = "background"       # This activates the demo splash look
  homepageImage = "img/background.jpg" # Optional: add an image to static/img/
  showRecent = true
  showRecentItems = 5

[article]
  showReadingTime = true
  showTableOfContents = true
